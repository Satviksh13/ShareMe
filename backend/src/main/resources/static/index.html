<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Share</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .card {
            border-radius: 15px;
        }
        .file-name {
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4 w-100" style="max-width: 420px;">

        <h3 class="text-center mb-2">
            <i class="bi bi-wifi"></i> LAN Share
        </h3>

        <p class="text-center text-muted mb-4">
            Share files instantly over Wi-Fi
        </p>

        <!-- 🔽 ADD QR CODE HERE -->
        <div class="text-center mb-4">
            <h6>📲 Scan to Connect</h6>
            <img src="/qr" class="img-fluid" style="max-width: 200px;">
        </div>

        <!-- Upload Form -->
        <form id="uploadForm">

            <div class="mb-3">
                <input class="form-control" type="file" id="fileInput" required>
                <div class="file-name mt-2" id="fileName"></div>
            </div>

            <div class="d-grid mb-3">
                <button class="btn btn-dark" type="submit">
                    <i class="bi bi-upload"></i> Upload
                </button>
            </div>

        </form>

        <!-- Progress Bar -->
        <div class="progress mb-3 d-none" id="progressContainer">
            <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
        </div>

        <!-- Status Message -->
        <div id="statusMsg" class="text-center mb-3"></div>

        <hr>

        <!-- File List -->
        <h5 class="text-center">📂 Available Files</h5>
        <ul class="list-group mt-3" id="fileList"></ul>

    </div>


</div>

<script>
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const form = document.getElementById("uploadForm");
    const progressBar = document.getElementById("progressBar");
    const progressContainer = document.getElementById("progressContainer");
    const statusMsg = document.getElementById("statusMsg");
    const fileList = document.getElementById("fileList");

    // Show selected file name
    fileInput.addEventListener("change", () => {
        fileName.textContent = fileInput.files[0]?.name || "";
    });

    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {
        stompClient.subscribe('/topic/files', function () {
            loadFiles(); // reload file list automatically
        });
    });

    // Upload file
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload", true);

        progressContainer.classList.remove("d-none");

        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percent + "%";
                progressBar.textContent = percent + "%";
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                statusMsg.innerHTML = `<span class="text-success">✅ Upload Successful</span>`;
                loadFiles(); // refresh file list
            } else {
                statusMsg.innerHTML = `<span class="text-danger">❌ Upload Failed</span>`;
            }
        };

        xhr.send(formData);
    });

    // Load files
    function loadFiles() {
        fetch(window.location.origin + "/files")
            .then(res => res.json())
            .then(files => {
                fileList.innerHTML = "";

                if (files.length === 0) {
                    fileList.innerHTML = `<li class="list-group-item text-center text-muted">No files yet</li>`;
                    return;
                }

                files.forEach(file => {
                    const li = document.createElement("li");
                    li.className = "list-group-item d-flex justify-content-between align-items-center";

                    li.innerHTML = `
                        <span><i class="bi bi-file-earmark"></i> ${file}</span>
                        <a href="/download/${file}" class="btn btn-sm btn-success">
                            <i class="bi bi-download"></i>
                        </a>
                    `;

                    fileList.appendChild(li);
                });
            });
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function loadFiles() {
        fetch(window.location.origin + "/files")
            .then(res => res.json())
            .then(files => {
                const fileList = document.getElementById("fileList");
                fileList.innerHTML = "";

                files.forEach(file => {
                    const li = document.createElement("li");
                    li.className = "list-group-item d-flex justify-content-between align-items-center";

                    li.innerHTML = `
                    <div>
                        <strong>${file.name}</strong><br>
                        <small class="text-muted">${formatSize(file.size)}</small>
                    </div>

                    <div>
                        <a href="/download/${file.name}" class="btn btn-sm btn-success me-2">
                            ⬇
                        </a>
                        <button class="btn btn-sm btn-danger" onclick="deleteFile('${file.name}')">
                            🗑
                        </button>
                    </div>
                `;

                    fileList.appendChild(li);
                });
            });
    }

    function deleteFile(filename) {
        fetch("/delete/" + filename, {
            method: "DELETE"
        })
            .then(() => loadFiles());
    }

    // Load files on page load
    window.onload = loadFiles;
</script>

</body>
</html>
